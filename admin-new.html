<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이슈 관리 - EventBET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">
            <i class="fas fa-edit mr-2"></i>
            이슈 관리
        </h1>
        
        <!-- 이슈 등록 폼 -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <h2 class="text-xl font-bold mb-4">새 이슈 등록</h2>
            <form id="issueForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">한국어 제목</label>
                        <input type="text" id="title_ko" class="w-full px-4 py-2 border rounded" placeholder="비트코인 10만불 돌파?" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">English Title</label>
                        <input type="text" id="title_en" class="w-full px-4 py-2 border rounded" placeholder="Will Bitcoin hit $100k?" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">中文标题</label>
                        <input type="text" id="title_zh" class="w-full px-4 py-2 border rounded" placeholder="比特币突破10万美元?" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">日本語タイトル</label>
                        <input type="text" id="title_ja" class="w-full px-4 py-2 border rounded" placeholder="ビットコインが10万ドル突破?" required>
                    </div>
                </div>
                
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">카테고리</label>
                        <select id="category" class="w-full px-4 py-2 border rounded" required>
                            <option value="crypto">암호화폐</option>
                            <option value="politics">정치</option>
                            <option value="sports">스포츠</option>
                            <option value="entertainment">엔터테인먼트</option>
                            <option value="economy">경제</option>
                            <option value="science">과학/기술</option>
                            <option value="climate">기후/환경</option>
                            <option value="other">기타</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">초기 USDT</label>
                        <input type="number" id="initial_usdt" class="w-full px-4 py-2 border rounded" value="60" min="1" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">만료일 (일)</label>
                        <input type="number" id="expire_days" class="w-full px-4 py-2 border rounded" value="7" min="1" required>
                    </div>
                </div>
                
                <!-- Yes/No 초기 비율 설정 -->
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                    <h4 class="font-semibold mb-3 text-blue-800">
                        <i class="fas fa-percentage mr-2"></i>
                        Yes/No 초기 비율 설정
                    </h4>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">Yes 비율 (%)</label>
                            <input type="number" id="yes_ratio" class="w-full px-4 py-2 border rounded" value="50" min="0" max="100" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">No 비율 (%)</label>
                            <input type="number" id="no_ratio" class="w-full px-4 py-2 border rounded" value="50" min="0" max="100" required>
                        </div>
                    </div>
                    <p class="text-xs text-gray-600 mt-2">
                        <i class="fas fa-info-circle mr-1"></i>
                        두 비율의 합은 100%가 되어야 합니다. 초기 USDT가 이 비율대로 분배됩니다.
                    </p>
                    <div id="ratio-warning" class="hidden mt-2 text-red-600 text-sm">
                        <i class="fas fa-exclamation-triangle mr-1"></i>
                        비율의 합이 100%가 아닙니다!
                    </div>
                </div>
                
                <input type="hidden" id="edit_id" value="">
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
                    <i class="fas fa-save mr-2"></i>
                    <span id="submitText">등록</span>
                </button>
                <button type="button" onclick="cancelEdit()" id="cancelBtn" class="bg-gray-500 text-white px-6 py-2 rounded hover:bg-gray-600 hidden">
                    취소
                </button>
            </form>
        </div>
        
        <!-- 이슈 목록 -->
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-bold mb-4">등록된 이슈</h2>
            <div id="issuesList"></div>
        </div>
    </div>

    <script>
        // API 기반 이슈 관리
        const API_BASE = '/api/issues'
        let allIssues = []
        
        // Load issues from API
        async function loadIssues() {
            console.log('🔄 Loading issues from API:', API_BASE)
            try {
                const response = await fetch(API_BASE)
                console.log('📡 Response status:', response.status)
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`)
                }
                
                const data = await response.json()
                console.log('📦 Received data:', data)
                
                if (data.success && Array.isArray(data.issues)) {
                    allIssues = data.issues
                    console.log('✅ Loaded', allIssues.length, 'issues')
                } else {
                    console.warn('⚠️ No issues array in response:', data)
                    allIssues = []
                }
                
                renderIssues()
            } catch (error) {
                console.error('❌ 이슈 로딩 실패:', error)
                const list = document.getElementById('issuesList')
                if (list) {
                    list.innerHTML = `
                        <div class="bg-red-50 border border-red-200 rounded p-4">
                            <p class="text-red-700 font-bold">⚠️ 오류 발생</p>
                            <p class="text-red-600 text-sm mt-2">${error.message}</p>
                            <button onclick="loadIssues()" class="mt-3 bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                                다시 시도
                            </button>
                        </div>
                    `
                }
                allIssues = []
            }
        }
        
        // Render issues
        function renderIssues() {
            console.log('🎨 Rendering', allIssues.length, 'issues')
            const list = document.getElementById('issuesList')
            
            if (!list) {
                console.error('❌ issuesList element not found!')
                return
            }
            
            if (allIssues.length === 0) {
                console.log('📭 No issues to display')
                list.innerHTML = `
                    <div class="bg-yellow-50 border border-yellow-200 rounded p-6 text-center">
                        <i class="fas fa-inbox text-4xl text-yellow-500 mb-3"></i>
                        <p class="text-gray-700 font-semibold">등록된 이슈가 없습니다.</p>
                        <p class="text-gray-500 text-sm mt-2">위 폼에서 새 이슈를 등록해보세요.</p>
                    </div>
                `
                return
            }
            
            console.log('✅ Rendering issues list')
            list.innerHTML = allIssues.map((issue, index) => {
                console.log(`  Issue ${index + 1}:`, issue.title_ko)
                const expireDate = issue.expire_date ? new Date(issue.expire_date) : null
                const createdAt = issue.createdAt || issue.created_at
                const initialUsdt = issue.initial_usdt || 60
                const yesBet = issue.yes_bet || 0
                const noBet = issue.no_bet || 0
                
                return `
                <div class="border rounded p-4 mb-4 hover:shadow-lg transition-shadow">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex-1">
                            <h3 class="font-bold text-lg">${issue.title_ko || 'N/A'}</h3>
                            <p class="text-sm text-gray-600">${issue.title_en || 'N/A'}</p>
                            <p class="text-sm text-gray-600">${issue.title_zh || 'N/A'}</p>
                            <p class="text-sm text-gray-600">${issue.title_ja || 'N/A'}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="deleteIssue('${issue.id}')" class="bg-red-500 text-white px-3 py-1 rounded text-sm hover:bg-red-600 transition-colors">
                                <i class="fas fa-trash"></i> 삭제
                            </button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-sm text-gray-600 mb-2">
                        <div><span class="inline-block bg-blue-100 px-2 py-1 rounded">${issue.category || 'N/A'}</span></div>
                        <div>만료일: ${expireDate ? expireDate.toLocaleDateString('ko-KR') : 'N/A'}</div>
                        <div>초기 USDT: ${initialUsdt}</div>
                        <div>Yes: ${yesBet} / No: ${noBet}</div>
                    </div>
                    <div class="text-xs text-gray-500">
                        등록: ${createdAt ? new Date(createdAt).toLocaleString('ko-KR') : 'N/A'}
                    </div>
                </div>
            `}).join('')
            
            console.log('✅ Render complete')
        }
        
        // Submit form
        document.getElementById('issueForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            
            // Yes/No 비율 검증
            const yesRatio = parseFloat(document.getElementById('yes_ratio').value)
            const noRatio = parseFloat(document.getElementById('no_ratio').value)
            const ratioWarning = document.getElementById('ratio-warning')
            
            if (Math.abs((yesRatio + noRatio) - 100) > 0.01) {
                ratioWarning.classList.remove('hidden')
                alert('❌ Yes와 No 비율의 합이 100%가 되어야 합니다!')
                return
            }
            ratioWarning.classList.add('hidden')
            
            // 초기 USDT를 비율대로 분배
            const initialUsdt = parseFloat(document.getElementById('initial_usdt').value)
            const yesBet = Math.round(initialUsdt * yesRatio / 100)
            const noBet = Math.round(initialUsdt * noRatio / 100)
            
            const formData = {
                title_ko: document.getElementById('title_ko').value,
                title_en: document.getElementById('title_en').value,
                title_zh: document.getElementById('title_zh').value,
                title_ja: document.getElementById('title_ja').value,
                category: document.getElementById('category').value,
                initial_usdt: initialUsdt,
                yes_bet: yesBet,
                no_bet: noBet,
                yes_ratio: yesRatio,
                no_ratio: noRatio,
                expire_days: parseInt(document.getElementById('expire_days').value)
            }
            
            console.log('📝 Submitting issue with ratios:', formData)
            
            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                })
                
                const result = await response.json()
                
                if (result.success) {
                    alert('✅ 등록되었습니다!\n\n메인 페이지를 Ctrl + Shift + R로 새로고침하면 표시됩니다.')
                    document.getElementById('issueForm').reset()
                    await loadIssues()
                } else {
                    alert('❌ 등록 실패: ' + (result.error || '알 수 없는 오류'))
                }
            } catch (error) {
                console.error('등록 실패:', error)
                alert('❌ 등록 중 오류가 발생했습니다.')
            }
        })
        
        // Delete issue
        async function deleteIssue(id) {
            if (!confirm('정말 삭제하시겠습니까?')) return
            
            try {
                const response = await fetch(`${API_BASE}/${id}`, {
                    method: 'DELETE'
                })
                
                const result = await response.json()
                
                if (result.success) {
                    alert('삭제되었습니다!')
                    await loadIssues()
                } else {
                    alert('삭제 실패: ' + (result.error || '알 수 없는 오류'))
                }
            } catch (error) {
                console.error('삭제 실패:', error)
                alert('삭제 중 오류가 발생했습니다.')
            }
        }
        
        // Cancel edit
        function cancelEdit() {
            document.getElementById('issueForm').reset()
            document.getElementById('edit_id').value = ''
            document.getElementById('submitText').textContent = '등록'
            document.getElementById('cancelBtn').classList.add('hidden')
        }
        
        // Yes/No 비율 실시간 검증
        function validateRatios() {
            const yesRatio = parseFloat(document.getElementById('yes_ratio').value) || 0
            const noRatio = parseFloat(document.getElementById('no_ratio').value) || 0
            const ratioWarning = document.getElementById('ratio-warning')
            const total = yesRatio + noRatio
            
            if (Math.abs(total - 100) > 0.01) {
                ratioWarning.classList.remove('hidden')
                ratioWarning.textContent = `⚠️ 비율의 합: ${total.toFixed(1)}% (100%가 되어야 합니다)`
            } else {
                ratioWarning.classList.add('hidden')
            }
        }
        
        // Yes 비율 변경 시 No 비율 자동 조정
        document.getElementById('yes_ratio').addEventListener('input', (e) => {
            const yesRatio = parseFloat(e.target.value) || 0
            if (yesRatio >= 0 && yesRatio <= 100) {
                document.getElementById('no_ratio').value = (100 - yesRatio).toFixed(0)
            }
            validateRatios()
        })
        
        // No 비율 변경 시 Yes 비율 자동 조정
        document.getElementById('no_ratio').addEventListener('input', (e) => {
            const noRatio = parseFloat(e.target.value) || 0
            if (noRatio >= 0 && noRatio <= 100) {
                document.getElementById('yes_ratio').value = (100 - noRatio).toFixed(0)
            }
            validateRatios()
        })
        
        // Load on page load with better error handling
        console.log('📄 Page script loaded')
        
        // Wait for DOM to be ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                console.log('✅ DOM ready, loading issues...')
                loadIssues()
            })
        } else {
            console.log('✅ DOM already ready, loading issues...')
            loadIssues()
        }
    </script>
</body>
</html>
